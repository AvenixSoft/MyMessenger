<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MyMessenger - Beta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
:root{
  --primary:#2AABEE;--primary-dark:#1a8fc9;--primary-light:#54c5f8;
  --bg:#17212b;--sidebar-bg:#17212b;--sidebar-header-bg:#232e3c;
  --chat-bg:#0e1621;--chat-header-bg:#17212b;
  --bubble-sent:#2b5278;--bubble-received:#182533;
  --input-bg:#17212b;--input-border:#2b3d4f;
  --text-primary:#e8eaed;--text-secondary:#a0acb8;--text-muted:#6d7f8f;
  --border:#1e2c3a;--online:#4dcd5e;
  --row-hover:#202e3e;--row-active:#2b5278;
  --scrollbar:#2b3d4f;--accent:#2AABEE;
  --error:#f04747;--glass-bg:rgba(35,46,60,0.85);
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text-primary);overflow:hidden;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#3d5166;}

/* ===== AUTH ===== */
.auth-screen{
  height:100vh;width:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0a111a 0%,#0e1621 40%,#162233 70%,#1a2b40 100%);
  padding:16px;position:relative;overflow:hidden;
}
.auth-screen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(42,171,238,0.08) 0%,transparent 70%),
             radial-gradient(ellipse 50% 40% at 20% 80%,rgba(84,197,248,0.05) 0%,transparent 60%);
  pointer-events:none;
}
.auth-card{
  background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  width:100%;max-width:420px;border-radius:20px;
  padding:40px 36px;
  box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06);
  animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;z-index:1;
}
@keyframes popIn{from{opacity:0;transform:translateY(24px) scale(0.95);}to{opacity:1;transform:none;}}

.brand{
  text-align:center;margin-bottom:32px;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.brand-logo{
  width:44px;height:44px;border-radius:14px;
  background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(42,171,238,0.4);
  flex-shrink:0;
}
.brand-text{font-size:24px;font-weight:800;letter-spacing:-0.5px;color:var(--text-primary);}
.brand-text span{color:var(--primary);}

.auth-tabs{
  display:flex;margin-bottom:28px;border-radius:12px;
  background:rgba(23,33,43,0.8);padding:4px;gap:4px;
}
.auth-tab{
  flex:1;padding:10px 16px;border:none;background:transparent;
  border-radius:9px;cursor:pointer;font-weight:600;font-size:14px;
  color:var(--text-muted);transition:all 0.2s ease;
}
.auth-tab.active{
  background:var(--primary);color:#fff;
  box-shadow:0 4px 14px rgba(42,171,238,0.4);
  transform:translateY(-1px);
}
.auth-tab:not(.active):hover{color:var(--text-secondary);background:rgba(255,255,255,0.04);}

.auth-form{display:flex;flex-direction:column;gap:14px;}

.input-group{position:relative;}
.input-group label{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--text-muted);pointer-events:none;
  transition:all 0.2s ease;background:transparent;padding:0 4px;z-index:1;
}
.input-group input:focus ~ label,
.input-group input:not(:placeholder-shown) ~ label{
  top:0;font-size:11px;color:var(--primary);
  background:linear-gradient(to bottom,transparent 40%,var(--sidebar-header-bg) 40%);
}
.input-group input{
  width:100%;padding:14px 16px;
  border:1.5px solid var(--input-border);border-radius:12px;
  font-size:14px;outline:none;transition:all 0.2s ease;
  background:rgba(23,33,43,0.6);color:var(--text-primary);
}
.input-group input::placeholder{color:transparent;}
.input-group input:focus{border-color:var(--primary);background:rgba(23,33,43,0.9);box-shadow:0 0 0 3px rgba(42,171,238,0.12);}

.pw-group{position:relative;}
.pw-group input{padding-right:48px;}
.pw-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:transparent;border:none;cursor:pointer;color:var(--text-muted);
  padding:4px;display:flex;align-items:center;transition:color 0.2s;
}
.pw-toggle:hover{color:var(--text-secondary);}

.btn-primary{
  padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  transition:all 0.2s ease;
  box-shadow:0 6px 20px rgba(42,171,238,0.35);
  margin-top:4px;position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  opacity:0;transition:opacity 0.2s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(42,171,238,0.45);}
.btn-primary:hover::after{opacity:1;}
.btn-primary:active{transform:translateY(0);box-shadow:0 4px 12px rgba(42,171,238,0.3);}

.auth-error{color:var(--error);font-size:12.5px;min-height:16px;text-align:center;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ===== APP LAYOUT ===== */
.app{display:flex;height:100vh;width:100%;background:var(--bg);}

/* ===== SIDEBAR ===== */
.sidebar{
  width:360px;min-width:280px;background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
}
.sidebar-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--sidebar-header-bg);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.me{display:flex;align-items:center;gap:10px;overflow:hidden;flex:1;min-width:0;}
.avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;flex-shrink:0;text-transform:uppercase;
  box-shadow:0 2px 8px rgba(42,171,238,0.25);
}
.avatar.sm{width:36px;height:36px;font-size:14px;}
.me-info{display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.me-username{
  font-weight:700;font-size:14px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary);
}
.me-status{font-size:11.5px;color:var(--online);display:flex;align-items:center;gap:4px;}

.icon-btn{
  border:none;background:transparent;cursor:pointer;
  color:var(--text-muted);padding:8px;border-radius:50%;
  transition:all 0.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{background:rgba(240,71,71,0.12);color:var(--error);}
.icon-btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}

.search-box{
  padding:10px 12px;background:var(--sidebar-header-bg);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.search-wrap{position:relative;}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);pointer-events:none;display:flex;
}
.search-wrap input{
  width:100%;padding:9px 14px 9px 36px;border-radius:20px;
  border:1.5px solid transparent;background:rgba(23,33,43,0.8);
  outline:none;font-size:14px;color:var(--text-primary);
  transition:all 0.2s;
}
.search-wrap input::placeholder{color:var(--text-muted);}
.search-wrap input:focus{border-color:var(--primary);background:rgba(23,33,43,1);}

.chats-list-label{
  padding:12px 16px 6px;font-size:11px;font-weight:700;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:0.9px;flex-shrink:0;
}
.chats-list,.search-results{overflow-y:auto;flex:1;}
.search-results{flex:none;max-height:50%;}

/* ===== USER ROW ===== */
.user-row{
  display:flex;align-items:center;gap:12px;padding:8px 12px;
  cursor:pointer;transition:background 0.15s;
  animation:rowIn 0.2s ease;
}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:none;}}
.user-row:hover{background:var(--row-hover);}
.user-row.active{background:var(--row-active);}
.user-row-body{
  flex:1;min-width:0;border-bottom:1px solid var(--border);
  padding-bottom:8px;
}
.user-row:last-child .user-row-body{border-bottom:none;}
.user-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.user-row-name{
  font-weight:600;font-size:14.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text-primary);flex:1;min-width:0;
}
.user-row-time{font-size:11.5px;color:var(--text-muted);flex-shrink:0;margin-left:6px;}
.user-row-sub{
  font-size:13px;color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.avatar-wrap{position:relative;flex-shrink:0;}
.status-dot{
  width:11px;height:11px;border-radius:50%;
  background:#3d5166;border:2px solid var(--sidebar-bg);
  position:absolute;right:0;bottom:0;
  transition:background 0.3s;
}
.status-dot.online{background:var(--online);}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:32px 16px;color:var(--text-muted);
}
.empty-state svg{opacity:0.3;}
.empty-state p{font-size:13px;text-align:center;opacity:0.8;}

/* ===== CHAT WINDOW ===== */
.chat-window{
  flex:1;display:flex;flex-direction:column;
  background:var(--chat-bg);position:relative;min-width:0;
}
.chat-window::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(42,171,238,0.025) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;z-index:0;
}
.chat-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;color:var(--text-muted);
  position:relative;z-index:1;
}
.chat-empty svg{opacity:0.2;}
.chat-empty p{font-size:15px;opacity:0.6;}

.chat-active{display:flex;flex-direction:column;height:100%;position:relative;z-index:1;}

.chat-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;background:var(--chat-header-bg);
  border-bottom:1px solid var(--border);flex-shrink:0;
  box-shadow:0 1px 6px rgba(0,0,0,0.2);
}
.chat-header-info{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-with-username{
  font-weight:700;font-size:15px;color:var(--text-primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.chat-with-status{font-size:12px;color:var(--text-muted);transition:color 0.3s;}
.chat-with-status.online{color:var(--online);}

.messages{
  flex:1;overflow-y:auto;padding:16px 20px;
  display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth;
}
.date-separator{
  display:flex;align-items:center;justify-content:center;margin:12px 0 8px;
}
.date-separator span{
  background:rgba(42,171,238,0.12);color:var(--text-secondary);
  font-size:12px;padding:3px 12px;border-radius:10px;
  border:1px solid rgba(42,171,238,0.08);
}

.message-row{
  display:flex;flex-direction:column;max-width:65%;
  animation:msgIn 0.2s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.message-row.sent{align-self:flex-end;align-items:flex-end;}
.message-row.received{align-self:flex-start;align-items:flex-start;}
.message-row.sent+.message-row.sent,
.message-row.received+.message-row.received{margin-top:-2px;}

.bubble{
  padding:9px 14px;border-radius:16px;
  font-size:14.5px;line-height:1.55;
  word-wrap:break-word;word-break:break-word;max-width:100%;
}
.message-row.sent .bubble{
  background:var(--bubble-sent);color:#e8f5fe;border-bottom-right-radius:4px;
}
.message-row.received .bubble{
  background:var(--bubble-received);color:var(--text-primary);border-bottom-left-radius:4px;
}
.msg-time{
  font-size:11px;color:var(--text-muted);margin-top:2px;
  padding:0 4px;display:flex;align-items:center;gap:4px;
}
.message-row.sent .msg-time{color:#5b8aae;}

.bubble-wrap{display:flex;align-items:center;gap:6px;max-width:100%;}
.message-row.sent .bubble-wrap{flex-direction:row-reverse;}
.msg-actions{display:flex;gap:2px;opacity:0.45;transition:opacity 0.15s;flex-shrink:0;}
.message-row:hover .msg-actions,.msg-actions:focus-within{opacity:1;}
.msg-action-btn{
  background:transparent;border:none;cursor:pointer;color:var(--text-muted);
  padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.msg-action-btn:hover{color:var(--primary);background:rgba(42,171,238,0.12);}
.msg-action-btn.danger:hover{color:var(--error);background:rgba(240,71,71,0.12);}
.msg-edit-input{
  background:rgba(0,0,0,0.25);border:1.5px solid var(--primary);border-radius:12px;
  padding:8px 13px;font-size:14.5px;color:inherit;outline:none;min-width:140px;
  font-family:inherit;
}
@media(hover:none){.msg-actions{opacity:0.6;}}

/* ===== MESSAGE FORM ===== */
.message-form{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:var(--chat-header-bg);
  border-top:1px solid var(--border);flex-shrink:0;
  padding-bottom:max(10px, env(safe-area-inset-bottom));
}
.msg-input-wrap{flex:1;position:relative;}
.message-form input{
  width:100%;padding:11px 16px;border-radius:22px;
  border:1.5px solid var(--input-border);
  background:var(--input-bg);outline:none;
  font-size:14.5px;color:var(--text-primary);transition:all 0.2s;
}
.message-form input::placeholder{color:var(--text-muted);}
.message-form input:focus{border-color:var(--primary);background:#1d2d3e;}
.btn-send{
  width:44px;height:44px;border-radius:50%;border:none;
  background:var(--primary);color:#fff;cursor:pointer;
  flex-shrink:0;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(42,171,238,0.35);
}
.btn-send:hover{background:var(--primary-dark);transform:scale(1.08);}
.btn-send:active{transform:scale(0.93);}

/* ===== BACK BUTTON ===== */
.back-btn{
  display:none;border:none;background:transparent;
  color:var(--primary);cursor:pointer;padding:6px;
  border-radius:8px;transition:all 0.2s;
  align-items:center;justify-content:center;
}
.back-btn:hover{background:rgba(42,171,238,0.1);}

/* ===== FOCUS STYLES ===== */
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .app{position:relative;}
  .sidebar{
    width:100%;min-width:0;
    position:absolute;inset:0;z-index:20;
  }
  .sidebar.hide-mobile{transform:translateX(-100%);}
  .chat-window{width:100%;}
  .message-row{max-width:85%;}
  .back-btn{display:flex;}
  .messages{padding:10px 12px;}
  .bubble{font-size:14px;}
}
@media(max-width:480px){
  .auth-card{padding:28px 20px;}
  .brand-text{font-size:20px;}
  .message-row{max-width:90%;}
  .messages{padding:8px 10px;}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="rgba(255,255,255,0.9)"/>
        </svg>
      </div>
      <span class="brand-text">My<span>Messenger - Beta</span></span>
    </div>

    <div class="auth-tabs" role="tablist">
      <button id="tab-login" class="auth-tab active" role="tab" aria-selected="true" aria-controls="login-form">Login</button>
      <button id="tab-signup" class="auth-tab" role="tab" aria-selected="false" aria-controls="signup-form">Sign Up</button>
    </div>

    <form id="login-form" class="auth-form" aria-label="Login form">
      <div class="input-group">
        <input type="email" id="login-email" placeholder="Email" required autocomplete="email" aria-label="Email">
        <label for="login-email">Email</label>
      </div>
      <div class="input-group pw-group">
        <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password" aria-label="Password">
        <label for="login-password">Password</label>
        <button type="button" class="pw-toggle" aria-label="Toggle password visibility" onclick="togglePw('login-password',this)">
          <svg id="eye-login" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button type="submit" class="btn-primary">
        <span>Sign In</span>
      </button>
      <p class="auth-error" id="login-error" role="alert" aria-live="polite"></p>
    </form>

    <form id="signup-form" class="auth-form hidden" aria-label="Sign up form">
      <div class="input-group">
        <input type="text" id="signup-username" placeholder="Username" required autocomplete="username" aria-label="Username">
        <label for="signup-username">Username</label>
      </div>
      <div class="input-group">
        <input type="email" id="signup-email" placeholder="Email" required autocomplete="email" aria-label="Email">
        <label for="signup-email">Email</label>
      </div>
      <div class="input-group pw-group">
        <input type="password" id="signup-password" placeholder="Password (min 6 chars)" required autocomplete="new-password" aria-label="Password, minimum 6 characters">
        <label for="signup-password">Password</label>
        <button type="button" class="pw-toggle" aria-label="Toggle password visibility" onclick="togglePw('signup-password',this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
      <p class="auth-error" id="signup-error" role="alert" aria-live="polite"></p>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app hidden">
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Contacts and chats">
    <div class="sidebar-header">
      <div class="me">
        <div class="avatar-wrap">
          <div class="avatar" id="me-avatar" aria-hidden="true"></div>
        </div>
        <div class="me-info">
          <span id="me-username" class="me-username"></span>
          <span class="me-status">
            <svg width="7" height="7" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#4dcd5e"/></svg>
            Online
          </span>
        </div>
      </div>
      <button id="logout-btn" class="icon-btn" title="Sign out" aria-label="Sign out">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="search-box">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input type="search" id="user-search" placeholder="Search users..." autocomplete="off" aria-label="Search users">
      </div>
    </div>

    <div id="search-results" class="search-results" role="list" aria-label="Search results"></div>

    <div class="chats-list-label" aria-hidden="true">Chats</div>
    <div id="chats-list" class="chats-list" role="list" aria-label="Conversations"></div>
  </aside>

  <main class="chat-window" role="main">
    <div id="chat-empty" class="chat-empty" aria-label="No chat selected">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Select a chat to start messaging</p>
    </div>

    <div id="chat-active" class="chat-active hidden">
      <div class="chat-header">
        <button class="back-btn" id="back-btn" aria-label="Back to chat list">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="avatar-wrap">
          <div class="avatar sm" id="chat-avatar" aria-hidden="true"></div>
          <span class="status-dot" id="chat-status-dot" aria-hidden="true"></span>
        </div>
        <div class="chat-header-info">
          <span id="chat-with-username" class="chat-with-username"></span>
          <span id="chat-with-status" class="chat-with-status">offline</span>
        </div>
      </div>

      <div id="messages" class="messages" role="log" aria-live="polite" aria-label="Messages"></div>

      <form id="message-form" class="message-form" aria-label="Send a message">
        <div class="msg-input-wrap">
          <input type="text" id="message-input" placeholder="Write a message…" autocomplete="off" aria-label="Message text">
        </div>
        <button type="submit" class="btn-send" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBgvme6SfGU2A3ChNC0Zv00tkFeAqyeuEI",
  authDomain: "mymessenger-8f7a7.firebaseapp.com",
  projectId: "mymessenger-8f7a7",
  storageBucket: "mymessenger-8f7a7.firebasestorage.app",
  messagingSenderId: "613473990295",
  appId: "1:613473990295:web:41a608563b41d8c34b9bd2"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ===== DOM ===== */
const authScreen      = document.getElementById('auth-screen');
const appEl           = document.getElementById('app');
const tabLogin        = document.getElementById('tab-login');
const tabSignup       = document.getElementById('tab-signup');
const loginForm       = document.getElementById('login-form');
const signupForm      = document.getElementById('signup-form');
const loginError      = document.getElementById('login-error');
const signupError     = document.getElementById('signup-error');
const meAvatar        = document.getElementById('me-avatar');
const meUsername      = document.getElementById('me-username');
const logoutBtn       = document.getElementById('logout-btn');
const userSearchInput = document.getElementById('user-search');
const searchResultsEl = document.getElementById('search-results');
const chatsListEl     = document.getElementById('chats-list');
const chatEmpty       = document.getElementById('chat-empty');
const chatActive      = document.getElementById('chat-active');
const chatAvatar      = document.getElementById('chat-avatar');
const chatWithUsername= document.getElementById('chat-with-username');
const chatWithStatus  = document.getElementById('chat-with-status');
const chatStatusDot   = document.getElementById('chat-status-dot');
const messagesEl      = document.getElementById('messages');
const messageForm     = document.getElementById('message-form');
const messageInput    = document.getElementById('message-input');
const sidebar         = document.getElementById('sidebar');
const backBtn         = document.getElementById('back-btn');

/* ===== STATE ===== */
let currentUser = null, currentUserData = null;
let activeChatId = null, activeChatPartner = null;
let unsubMessages = null, unsubChatsList = null, unsubPartnerStatus = null;

/* ===== UTILS ===== */
function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
}

function formatTime(ts) {
  if (!ts || !ts.toDate) return '';
  return ts.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatListTime(ts) {
  if (!ts || !ts.toDate) return '';
  const d = ts.toDate(), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function getChatId(a, b) { return [a, b].sort().join('_'); }

function friendlyError(err) {
  if (!err || !err.code) return 'Something went wrong. Please try again.';
  const map = {
    'auth/email-already-in-use': 'This email is already registered.',
    'auth/invalid-email': 'Invalid email address.',
    'auth/weak-password': 'Password should be at least 6 characters.',
    'auth/user-not-found': 'No account found with this email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/invalid-credential': 'Invalid email or password.',
    'auth/too-many-requests': 'Too many attempts. Please try again later.',
    'permission-denied': 'Permission denied. Check Firestore security rules.'
  };
  return map[err.code] || err.message || 'Unexpected error occurred.';
}

function buildUserRow(u, subText, showDot, timeText) {
  const row = document.createElement('div');
  row.className = 'user-row';
  row.setAttribute('role', 'listitem');
  row.setAttribute('tabindex', '0');

  const wrap = document.createElement('div');
  wrap.className = 'avatar-wrap';
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = (u.username || '?').charAt(0).toUpperCase();
  av.setAttribute('aria-hidden', 'true');
  wrap.appendChild(av);

  if (showDot) {
    const dot = document.createElement('span');
    dot.className = 'status-dot' + (u.online ? ' online' : '');
    dot.setAttribute('aria-hidden', 'true');
    wrap.appendChild(dot);
  }

  const body = document.createElement('div');
  body.className = 'user-row-body';

  const top = document.createElement('div');
  top.className = 'user-row-top';

  const name = document.createElement('span');
  name.className = 'user-row-name';
  name.textContent = u.username;
  top.appendChild(name);

  if (timeText) {
    const t = document.createElement('span');
    t.className = 'user-row-time';
    t.textContent = timeText;
    top.appendChild(t);
  }

  const sub = document.createElement('span');
  sub.className = 'user-row-sub';
  sub.textContent = subText || '';

  body.appendChild(top);
  body.appendChild(sub);
  row.appendChild(wrap);
  row.appendChild(body);

  row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') row.click(); });

  return row;
}

/* ===== AUTH TABS ===== */
function switchTab(toLogin) {
  tabLogin.classList.toggle('active', toLogin);
  tabSignup.classList.toggle('active', !toLogin);
  tabLogin.setAttribute('aria-selected', toLogin);
  tabSignup.setAttribute('aria-selected', !toLogin);
  loginForm.classList.toggle('hidden', !toLogin);
  signupForm.classList.toggle('hidden', toLogin);
  loginError.textContent = '';
  signupError.textContent = '';
}
tabLogin.addEventListener('click', () => switchTab(true));
tabSignup.addEventListener('click', () => switchTab(false));

/* ===== SIGNUP ===== */
signupForm.addEventListener('submit', async e => {
  e.preventDefault();
  signupError.textContent = '';
  const username = document.getElementById('signup-username').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const btn      = signupForm.querySelector('.btn-primary');

  if (!username || username.length < 3) { signupError.textContent = 'Username must be at least 3 characters.'; return; }
  const usernameLower = username.toLowerCase();

  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const existing = await db.collection('users').where('username_lower','==',usernameLower).limit(1).get();
    if (!existing.empty) { signupError.textContent = 'Username already taken. Choose another.'; return; }

    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid, username, username_lower: usernameLower, email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp()
    });
    signupForm.reset();
  } catch(err) {
    signupError.textContent = friendlyError(err);
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
});

/* ===== LOGIN ===== */
loginForm.addEventListener('submit', async e => {
  e.preventDefault();
  loginError.textContent = '';
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = loginForm.querySelector('.btn-primary');

  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await auth.signInWithEmailAndPassword(email, password);
    loginForm.reset();
  } catch(err) {
    loginError.textContent = friendlyError(err);
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});

/* ===== LOGOUT ===== */
logoutBtn.addEventListener('click', async () => {
  try {
    if (currentUser)
      await db.collection('users').doc(currentUser.uid).update({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
  } catch(_) {}
  await auth.signOut();
});

/* ===== BACK BUTTON ===== */
backBtn.addEventListener('click', () => sidebar.classList.remove('hide-mobile'));

/* ===== AUTH STATE ===== */
auth.onAuthStateChanged(async user => {
  cleanupListeners();
  if (user) {
    currentUser = user;
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        uid: user.uid, username: user.email.split('@')[0],
        username_lower: user.email.split('@')[0].toLowerCase(), email: user.email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await ref.update({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
    }
    currentUserData = (await ref.get()).data();
    renderMe();
    showApp();
    listenToChatsList();
    window.addEventListener('beforeunload', setOffline);
  } else {
    currentUser = null; currentUserData = null;
    activeChatId = null; activeChatPartner = null;
    showAuth();
  }
});

function setOffline() {
  if (currentUser)
    db.collection('users').doc(currentUser.uid).update({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
}

function cleanupListeners() {
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  if (unsubChatsList) { unsubChatsList(); unsubChatsList = null; }
  if (unsubPartnerStatus) { unsubPartnerStatus(); unsubPartnerStatus = null; }
}

function showApp() {
  authScreen.classList.add('hidden');
  appEl.classList.remove('hidden');
}

function showAuth() {
  appEl.classList.add('hidden');
  authScreen.classList.remove('hidden');
  chatsListEl.innerHTML = '';
  searchResultsEl.innerHTML = '';
  messagesEl.innerHTML = '';
  chatActive.classList.add('hidden');
  chatEmpty.classList.remove('hidden');
}

function renderMe() {
  meUsername.textContent = currentUserData.username;
  meAvatar.textContent = currentUserData.username.charAt(0).toUpperCase();
}

/* ===== USER SEARCH ===== */
let searchTimer = null;
userSearchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const term = userSearchInput.value.trim().toLowerCase();
  if (!term) { searchResultsEl.innerHTML = ''; return; }
  searchTimer = setTimeout(() => runSearch(term), 300);
});

async function runSearch(term) {
  try {
    const snap = await db.collection('users')
      .where('username_lower','>=',term)
      .where('username_lower','<=',term+'\uf8ff')
      .limit(15).get();

    searchResultsEl.innerHTML = '';
    const results = snap.docs.filter(d => d.id !== currentUser.uid);

    if (!results.length) {
      searchResultsEl.innerHTML = '';
      const es = document.createElement('div');
      es.className = 'empty-state';
      es.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No users found</p>`;
      searchResultsEl.appendChild(es);
      return;
    }

    results.forEach(doc => {
      const u = doc.data();
      const row = buildUserRow(u, u.email || '', false);
      row.addEventListener('click', () => openChatWith(u));
      searchResultsEl.appendChild(row);
    });
  } catch(err) {
    console.error(err);
    searchResultsEl.innerHTML = '<div class="empty-state"><p>Search error. Try again.</p></div>';
  }
}

/* ===== CHATS LIST (real-time) ===== */
// Cache partner user docs to avoid redundant reads
const partnerCache = {};

function listenToChatsList() {
  // NOTE: deliberately no .orderBy() here — combining it with the
  // array-contains where() requires a Firestore composite index. If that
  // index doesn't exist yet, the listener fails silently (only logs to
  // console) and the sidebar just looks empty. We sort client-side instead
  // so the list always works, with or without an index.
  const query = db.collection('chats')
    .where('participants','array-contains', currentUser.uid);

  unsubChatsList = query.onSnapshot(async snap => {
    if (snap.empty) {
      chatsListEl.innerHTML = '';
      const es = document.createElement('div');
      es.className = 'empty-state';
      es.innerHTML = `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>No chats yet.<br>Search for a user to start.</p>`;
      chatsListEl.appendChild(es);
      return;
    }

    // Fetch missing partner docs in parallel
    const partnerFetches = snap.docs.map(async doc => {
      const chat = doc.data();
      const partnerUid = chat.participants.find(id => id !== currentUser.uid);
      if (!partnerUid) return null;
      if (!partnerCache[partnerUid]) {
        const pSnap = await db.collection('users').doc(partnerUid).get();
        if (!pSnap.exists) return null;
        partnerCache[partnerUid] = pSnap.data();
      }
      return { chatDoc: doc, chat, partner: partnerCache[partnerUid] };
    });

    let resolved = (await Promise.all(partnerFetches)).filter(Boolean);

    // Sort newest-first on the client instead of relying on a Firestore index.
    resolved.sort((a, b) => {
      const at = a.chat.lastMessageAt && a.chat.lastMessageAt.toMillis ? a.chat.lastMessageAt.toMillis() : 0;
      const bt = b.chat.lastMessageAt && b.chat.lastMessageAt.toMillis ? b.chat.lastMessageAt.toMillis() : 0;
      return bt - at;
    });

    chatsListEl.innerHTML = '';
    resolved.forEach(({ chatDoc, chat, partner }) => {
      const timeText = formatListTime(chat.lastMessageAt);
      const preview = chat.lastMessage || '';
      const row = buildUserRow(partner, preview, true, timeText);
      row.dataset.chatId = chatDoc.id;

      if (chatDoc.id === activeChatId) row.classList.add('active');
      row.addEventListener('click', () => openChatWith(partner));
      chatsListEl.appendChild(row);
    });
  }, err => {
    console.error('Chats list error:', err);
    chatsListEl.innerHTML = '';
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.innerHTML = `<p>Couldn't load chats: ${friendlyError(err)}</p>`;
    chatsListEl.appendChild(es);
  });
}

/* ===== OPEN / CREATE CHAT ===== */
async function openChatWith(partnerData) {
  const partnerUid = partnerData.uid;
  if (!partnerUid || partnerUid === currentUser.uid) return;

  const chatId = getChatId(currentUser.uid, partnerUid);
  activeChatId = chatId;
  activeChatPartner = partnerData;

  const chatRef = db.collection('chats').doc(chatId);
  const chatSnap = await chatRef.get();
  if (!chatSnap.exists) {
    await chatRef.set({
      participants: [currentUser.uid, partnerUid],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: '',
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  chatEmpty.classList.add('hidden');
  chatActive.classList.remove('hidden');
  chatAvatar.textContent = partnerData.username.charAt(0).toUpperCase();
  chatWithUsername.textContent = partnerData.username;

  document.querySelectorAll('.user-row').forEach(r => r.classList.remove('active'));
  const activeRow = chatsListEl.querySelector(`[data-chat-id="${chatId}"]`);
  if (activeRow) activeRow.classList.add('active');

  if (window.innerWidth <= 768) sidebar.classList.add('hide-mobile');

  userSearchInput.value = '';
  searchResultsEl.innerHTML = '';

  listenToMessages(chatId);
  listenToPartnerStatus(partnerUid);
}

/* ===== PARTNER STATUS ===== */
function listenToPartnerStatus(partnerUid) {
  if (unsubPartnerStatus) unsubPartnerStatus();
  unsubPartnerStatus = db.collection('users').doc(partnerUid).onSnapshot(doc => {
    if (!doc.exists) return;
    const online = !!doc.data().online;
    chatWithStatus.textContent = online ? 'online' : 'offline';
    chatWithStatus.classList.toggle('online', online);
    chatStatusDot.classList.toggle('online', online);
  });
}

/* ===== MESSAGES (real-time) ===== */
function listenToMessages(chatId) {
  if (unsubMessages) unsubMessages();
  messagesEl.innerHTML = '';

  unsubMessages = db.collection('chats').doc(chatId)
    .collection('messages').orderBy('createdAt','asc')
    .onSnapshot(snap => {
      messagesEl.innerHTML = '';
      let lastDate = null;

      snap.forEach(doc => {
        const msg = doc.data();
        if (msg.createdAt && msg.createdAt.toDate) {
          const dateStr = msg.createdAt.toDate().toDateString();
          if (dateStr !== lastDate) {
            lastDate = dateStr;
            const sep = document.createElement('div');
            sep.className = 'date-separator';
            const lbl = document.createElement('span');
            const d = msg.createdAt.toDate();
            const today = new Date();
            lbl.textContent = d.toDateString() === today.toDateString()
              ? 'Today'
              : d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
            sep.appendChild(lbl);
            messagesEl.appendChild(sep);
          }
        }
        renderMessage(msg, doc.id, chatId);
      });

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, err => console.error('Messages error:', err));
}

function renderMessage(msg, msgId, chatId) {
  const row = document.createElement('div');
  const isSent = msg.senderId === currentUser.uid;
  row.className = 'message-row ' + (isSent ? 'sent' : 'received');

  const bubbleWrap = document.createElement('div');
  bubbleWrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = msg.text;
  bubbleWrap.appendChild(bubble);

  // Only the sender can edit/delete their own messages.
  if (isSent && msgId) {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';

    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'msg-action-btn';
    editBtn.title = 'Edit message';
    editBtn.setAttribute('aria-label', 'Edit message');
    editBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>`;
    editBtn.addEventListener('click', () => startEditMessage(bubble, msgId, chatId, msg.text));

    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'msg-action-btn danger';
    delBtn.title = 'Delete message';
    delBtn.setAttribute('aria-label', 'Delete message');
    delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
    delBtn.addEventListener('click', () => deleteMessage(msgId, chatId));

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    bubbleWrap.appendChild(actions);
  }

  row.appendChild(bubbleWrap);

  const time = document.createElement('span');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.createdAt) + (msg.edited ? ' · edited' : '');

  row.appendChild(time);
  messagesEl.appendChild(row);
}

/* ===== EDIT MESSAGE ===== */
function startEditMessage(bubbleEl, msgId, chatId, currentText) {
  let settled = false;
  bubbleEl.innerHTML = '';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'msg-edit-input';
  input.value = currentText;
  bubbleEl.appendChild(input);
  input.focus();
  input.setSelectionRange(currentText.length, currentText.length);

  async function finish(save) {
    if (settled) return;
    settled = true;

    if (save) {
      const newText = input.value.trim();
      if (newText && newText !== currentText) {
        try {
          await db.collection('chats').doc(chatId).collection('messages').doc(msgId)
            .update({ text: newText, edited: true });
          refreshLastMessage(chatId); // fire and forget; onSnapshot repaints the bubble
          return;
        } catch (err) {
          alert('Failed to edit message: ' + friendlyError(err));
        }
      }
    }
    // Cancelled, empty, or unchanged: restore the original text.
    bubbleEl.textContent = currentText;
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
    else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
  });
  input.addEventListener('blur', () => finish(true));
}

/* ===== DELETE MESSAGE ===== */
async function deleteMessage(msgId, chatId) {
  if (!confirm('Delete this message?')) return;
  try {
    await db.collection('chats').doc(chatId).collection('messages').doc(msgId).delete();
    await refreshLastMessage(chatId);
  } catch (err) {
    alert('Failed to delete message: ' + friendlyError(err));
  }
}

/* ===== KEEP CHAT PREVIEW IN SYNC AFTER EDIT/DELETE ===== */
async function refreshLastMessage(chatId) {
  try {
    const chatRef = db.collection('chats').doc(chatId);
    const snap = await chatRef.collection('messages')
      .orderBy('createdAt', 'desc').limit(1).get();

    if (snap.empty) {
      await chatRef.update({ lastMessage: '' });
    } else {
      const last = snap.docs[0].data();
      await chatRef.update({ lastMessage: last.text, lastMessageAt: last.createdAt });
    }
  } catch (err) {
    console.error('Failed to refresh chat preview:', err);
  }
}

/* ===== SEND MESSAGE ===== */
messageForm.addEventListener('submit', async e => {
  e.preventDefault();
  const text = messageInput.value.trim();
  if (!text || !activeChatId || !activeChatPartner) return;
  messageInput.value = '';

  try {
    const chatRef = db.collection('chats').doc(activeChatId);
    await chatRef.collection('messages').add({
      text, senderId: currentUser.uid,
      senderUsername: currentUserData.username,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await chatRef.update({
      lastMessage: text,
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(err) {
    alert('Failed to send: ' + friendlyError(err));
  }
});
</script>
</body>
</html>
